# Publica o site no GitHub Pages — sem precisar tocar nas Settings!
# ------------------------------------------------------------------
# O actions/configure-pages com "enablement: true" ativa o Pages do
# repositório sozinho na primeira execução (fonte: GitHub Actions).
#
# Roda: a cada push na main, manualmente, e sempre que o workflow
# "Atualizar resultados" termina (commits do bot não disparam eventos
# de push para outros workflows — este gatilho cobre isso).

name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Atualizar resultados"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar (e ativar) o Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
