# Atualiza resultados do torneio automaticamente (GitHub Actions)
# --------------------------------------------------------------
# Requisito: criar o secret FOOTBALL_DATA_TOKEN no repositório
# (Settings → Secrets and variables → Actions) com um token gratuito
# de https://www.football-data.org/client/register
#
# Sem o secret, o workflow roda, avisa e não muda nada — inofensivo.

name: Atualizar resultados

on:
  schedule:
    - cron: "*/30 * * * *" # a cada 30 minutos durante o torneio
  workflow_dispatch: {} # botão "Run workflow" para rodar na mão

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Importar resultados on-line
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/atualizar-resultados.mjs

      - name: Commit e push se houver mudanças
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "bolao-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "⚽ Atualiza resultados do torneio (automático)"
            git push
          else
            echo "Nenhuma mudança nos dados."
          fi
